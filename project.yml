name: NeighborhoodWatchVision

options:
  bundleIdPrefix: com.NeighborhoodWatchVision
  deploymentTarget:
    visionOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEAD_CODE_STRIPPING: true

targets:

  # ───────────────────────────────────────────
  # Main App Target
  # ───────────────────────────────────────────
  NeighborhoodWatchVision:
    type: application
    platform: visionOS
    deploymentTarget:
      visionOS: "26.0"
    sources:
      - path: NeighborhoodWatchVision
        excludes:
          - "**/*.xcassets/.*"
    resources:
      - path: NeighborhoodWatchVision/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.NeighborhoodWatchVision
        PRODUCT_NAME: NeighborhoodWatchVision
        INFOPLIST_FILE: NeighborhoodWatchVision/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ${XCONFIG["ID"]}
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: "1.1.0"
        

        # Swift / Concurrency
        SWIFT_EMIT_LOC_STRINGS: true
        SWIFT_OPTIMIZATION_LEVEL[config=Debug]: "-Onone"
        SWIFT_OPTIMIZATION_LEVEL[config=Release]: "-Owholemodule"

        # visionOS specifics
#        SUPPORTED_PLATFORMS: xros
#        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false

      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ENABLE_TESTABILITY: true
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

    dependencies:
      # Uncomment if you split into local SPM packages:
      # - package: MyCore
      # - package: MySpatial
      - package: RealityKitContent

    info:
      path: NeighborhoodWatchVision/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: NeighborhoodWatchVision
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "1.0"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        # Immersive Space scene (RealityKit)
        UIApplicationPreferredDefaultSceneSessionRole: UIWindowSceneSessionRoleVolumetricApplication
        

    preBuildScripts: []
    postBuildScripts: []
    # Uncomment for SwiftLint:
    # preBuildScripts:
    #   - name: SwiftLint
    #     basedOnDependencyAnalysis: false
    #     shell: /bin/sh
    #     script: |
    #       if command -v swiftlint >/dev/null 2>&1; then
    #         swiftlint
    #       fi

# ───────────────────────────────────────────
# Swift Packages (SPM)
# ───────────────────────────────────────────
packages:
  # Example: add remote packages here
  # RealityKitContent:
  #   url: https://github.com/example/RealityKitContent
  #   from: "1.0.0"
  RealityKitContent:
    path: Packages/RealityKitContent
