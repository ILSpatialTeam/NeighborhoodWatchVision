name: NeighborhoodWatchVision

options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    visionOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEAD_CODE_STRIPPING: true

targets:

  # ───────────────────────────────────────────
  # Main App Target
  # ───────────────────────────────────────────
  NeighborhoodWatchVision:
    type: application
    platform: visionOS
    deploymentTarget:
      visionOS: "26.0"
    sources:
      - path: NeighborhoodWatchVision
    resources:
      - path: NeighborhoodWatchVision/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.NeighborhoodWatchVision
        PRODUCT_NAME: NeighborhoodWatchVision
        INFOPLIST_FILE: NeighborhoodWatchVision/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: S8QWSSL8FP
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        SWIFT_EMIT_LOC_STRINGS: true
        SWIFT_OPTIMIZATION_LEVEL[config=Debug]: "-Onone"
        SWIFT_OPTIMIZATION_LEVEL[config=Release]: "-Owholemodule"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ENABLE_TESTABILITY: true
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

    dependencies:
      - package: RealityKitContent
        product: RealityKitContent
      - package: ILSDesignSystem
        product: ILSDesignSystem
      - package: ILSEngine
        product: ILSEngine
      - package: ILSFoundation
        product: ILSFoundation
      - package: ILSNetwork
        product: ILSNetwork
      - package: ILSHandTracking
        product: ILSHandTracking
      - package: ILSSpatialAudio
        product: ILSSpatialAudio
      - package: ILSSpatialDraw
        product: ILSSpatialDraw
      - package: ILSRealityAssets
        product: ILSRealityAssets
    # MLX Swift core (numerics / NN layers)
      - package: mlx-swift
        product: MLX
    # MLX Swift LM (LLM loading + inference)
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
    # Hugging Face tokenizer/hub utilities
      - package: swift-transformers
        product: Hub
      - package: swift-transformers
        product: Tokenizers
        
    info:
      path: NeighborhoodWatchVision/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: NeighborhoodWatchVision
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIApplicationPreferredDefaultSceneSessionRole: UIWindowSceneSessionRoleVolumetricApplication
        NSSpeechRecognitionUsageDescription: "Dibutuhkan untuk mengenali suara pemain saat berinteraksi dengan warga."
        NSMicrophoneUsageDescription: "Dibutuhkan untuk merekam perintah suara di pos penjagaan."
    preBuildScripts: []
    postBuildScripts: []

  # ───────────────────────────────────────────
  # Unit Test Target
  # ───────────────────────────────────────────
#  NeighborhoodWatchVisionTests:
#    type: bundle.unit-test
#    platform: visionOS
#    sources:
#      - path: NeighborhoodWatchVisionTests
#    dependencies:
#      - target: NeighborhoodWatchVision
#    settings:
#      base:
#        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.NeighborhoodWatchVision.tests
#        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NeighborhoodWatchVision.app/NeighborhoodWatchVision"
#        BUNDLE_LOADER: "$(TEST_HOST)"
#        DEVELOPMENT_TEAM: S8QWSSL8FP
#        CODE_SIGN_STYLE: Automatic

# ───────────────────────────────────────────
# Swift Packages (SPM)
# ───────────────────────────────────────────
packages:
  # Example: add remote packages here
  # RealityKitContent:
  #   url: https://github.com/example/RealityKitContent
  #   from: "1.0.0"
  RealityKitContent:
    path: Packages/RealityKitContent
  ILSDesignSystem:
    path: sharedPackage/Components/ILSDesignSystem
  ILSEngine:
    path: sharedPackage/Core/ILSEngine
  ILSFoundation:
    path: sharedPackage/Core/ILSFoundation
  ILSNetwork:
    path: sharedPackage/Core/ILSNetwork
  ILSHandTracking:
    path: sharedPackage/Features/ILSHandTracking
  ILSSpatialAudio:
    path: sharedPackage/Features/ILSSpatialAudio
  ILSSpatialDraw:
    path: sharedPackage/Features/ILSSpatialDraw
  ILSRealityAssets:
    path: sharedPackage/RealityKitContent/ILSRealityAssets
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift.git
    from: 0.31.6
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: 3.31.4
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers.git
    from: 1.3.3
    
